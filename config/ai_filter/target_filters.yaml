#
# 说明：
#   - chain_target_suffixes：传导链末端的过程状态词后缀，匹配到则
#     认定该字符串只是过程描述，不应作为可交易标的输出。
#   - generic_target_labels：过宽泛、无法直接交易的标签；即便 AI
#     把它们塞进 related_targets，后处理会将其剔除。
#   - market_summary_keywords：用于判断 market_summary 质量是否合格
#     的关键词集合；命中数少则会被打回重写或以提示方式告警。
#
# 运行时 analyzer 会读取本文件覆盖默认词表。如果本文件缺失或解析失败
# 会回退到 analyzer 中内置的默认集合（见 analyzer.py 类级常量）。
# 修改后无需重启常驻服务，新一次分析开始时会重新加载（analyzer 初始化）。
#
# ═══════════════════════════════════════════════════════════════

